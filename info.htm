<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>相關資訊 - 年輕型失智症</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000000;
            color: #f5f5f5;
            font-family: 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .serif { font-family: 'Noto Serif TC', serif; }
        .glass-panel {
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 3rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 32rem;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #3b82f6;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
    </style>
</head>
<body>

    <main class="px-6 w-full flex justify-center">
        <div class="glass-panel space-y-8">
            <header class="text-center space-y-2">
                <h1 class="serif text-3xl text-white font-bold tracking-wider">了解年輕型失智症</h1>
                <p class="text-neutral-500 font-light tracking-[0.3em] uppercase text-[10px]">Information & Resources</p>
            </header>
            
            <div class="space-y-6">
                <section class="info-card">
                    <h2 class="text-blue-400 font-bold mb-2">什麼是年輕型失智症？</h2>
                    <p class="text-sm text-neutral-300 leading-relaxed text-justify">
                        指 65 歲以下發病的失智症。與老年型不同，患者多處於職場巔峰或家庭經濟支柱，面臨更嚴峻的社會與心理挑戰。
                    </p>
                </section>

                <section class="info-card" style="border-left-color: #ef4444;">
                    <h2 class="text-red-400 font-bold mb-2">常見警訊</h2>
                    <ul class="text-sm text-neutral-300 space-y-1 list-disc list-inside">
                        <li>記憶力減退影響工作</li>
                        <li>對原本熟悉的工具感到陌生</li>
                        <li>情緒或人格出現極端轉變</li>
                        <li>喪失對時間與空間的定向感</li>
                    </ul>
                </section>

                <section class="info-card" style="border-left-color: #10b981;">
                    <h2 class="text-emerald-400 font-bold mb-2">尋求協助</h2>
                    <p class="text-sm text-neutral-300 leading-relaxed">
                        失智症關懷專線：<span class="text-white font-mono">0800-474-580</span><br>
                        (服務時間：週一至週五 9:00 - 21:00)
                    </p>
                </section>
            </div>

            <footer class="text-center pt-4">
                <!-- 相對路徑跳轉，確保在 GitHub Repository 子目錄下運作 -->
                <a href="index.htm" class="inline-block px-8 py-3 border border-white/10 text-neutral-400 hover:text-white hover:bg-white/5 transition-all text-xs tracking-[0.4em] uppercase rounded-full">
                    ← 返回體驗首頁
                </a>
            </footer>
        </div>
    </main>

</body>
</html>
